# Solid Queue: polling и пулы воркеров. Повторы и отбрасывания задаются в Active Job
# (см. app/jobs/application_job.rb и конкретные job-классы через retry_on / discard_on).
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: <%= ENV.fetch("SOLID_QUEUE_THREADS", 3) %>
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
