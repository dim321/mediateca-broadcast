# CodeRabbit: https://docs.coderabbit.ai
# Установите GitHub App для организации/репозитория: https://coderabbit.ai — без этого файл только задаёт настройки.
language: "ru-RU"

reviews:
  profile: "chill"
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false

path_instructions:
  - path: "**/*.{rb,erb,slim}"
    instructions: >
      Стек: Ruby on Rails 8, PostgreSQL, RSpec, Pundit, Hotwire (Turbo), ViewComponent, Slim.
      Ориентируйся на соглашения RuboCop omakase и идиоматичный Ruby.
  - path: "spec/**/*"
    instructions: >
      Проверяй покрытие сценариев, изоляцию тестов (стабы внешних команд: ffprobe/ffmpeg где нужно),
      и соответствие доменным правилам из specs/001-media-playlist-broadcast/.
